{% load i18n %}
<div x-data="contractBatchFolderSelectorApp()" x-show="showBrowser" x-cloak class="folder-browser-modal" @click.self="closeBrowser()">
    <div class="folder-browser-content batch-folder-selector" x-ref="browserContent">
        <div class="folder-browser-resize-handle"
             @mousedown.prevent="
                const el = $refs.browserContent;
                el.style.maxWidth = 'none';
                const startX = $event.clientX;
                const startW = el.offsetWidth;
                const handle = $el;
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                const onMove = (ev) => {
                    el.style.width = Math.max(400, startW + ev.clientX - startX) + 'px';
                };
                const onUp = () => {
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
             "></div>
        <div class="folder-browser-header">
            <h2>{% trans "选择根目录" %}</h2>
            <button type="button" class="folder-browser-close" @click="closeBrowser()">×</button>
            <div class="manual-path-input">
                <input type="text" x-model="manualPath"
                       placeholder="{% trans '输入文件夹路径，例如：/Users/username/Documents' %}"
                       @keydown.enter="bindManualPath()">
                <button type="button" class="btn-folder primary" @click="bindManualPath()" :disabled="loading">
                    {% trans "确认" %}
                </button>
            </div>
            <div x-show="error" class="folder-browser-error" x-text="error"></div>
        </div>

        <div class="finder-toolbar">
            <button type="button" class="btn-folder" @click="navigateUp()" :disabled="loading">
                ↑
            </button>
        </div>

        <div x-show="!loading" class="finder-columns" :class="{ 'loading': loadingColumn }">
            <template x-for="(column, columnIndex) in columns" :key="columnIndex">
                <div class="finder-column" :class="{ 'loading': loadingColumn && columnIndex === columns.length - 1 }">
                    <div class="column-resize-handle"
                         @mousedown.prevent="
                            const col = $el.parentElement;
                            const startX = $event.clientX;
                            const startW = col.offsetWidth;
                            $el.classList.add('active');
                            document.body.style.cursor = 'col-resize';
                            document.body.style.userSelect = 'none';
                            const onMove = (ev) => {
                                const w = Math.max(120, startW + ev.clientX - startX);
                                col.style.flex = 'none';
                                col.style.width = w + 'px';
                            };
                            const onUp = () => {
                                $el.classList.remove('active');
                                document.body.style.cursor = '';
                                document.body.style.userSelect = '';
                                document.removeEventListener('mousemove', onMove);
                                document.removeEventListener('mouseup', onUp);
                            };
                            document.addEventListener('mousemove', onMove);
                            document.addEventListener('mouseup', onUp);
                         "></div>
                    <template x-if="column.entries.length > 0">
                        <div>
                            <template x-for="(entry, entryIndex) in column.entries" :key="entry.path">
                                <div class="finder-item"
                                     :class="{ 'selected': column.selectedIndex === entryIndex }"
                                     @click="selectFolder(columnIndex, entryIndex, entry)">
                                    <span class="finder-item-icon">📁</span>
                                    <span class="finder-item-name" x-text="entry.name"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="column.entries.length === 0">
                        <div class="finder-empty">{% trans "此文件夹为空" %}</div>
                    </template>
                </div>
            </template>
        </div>

        <div x-show="loading" class="folder-browser-loading">{% trans "加载中..." %}</div>

        <div class="folder-browser-footer">
            <div class="selected-path-display" x-text="getCurrentPath() || '{% trans "请选择文件夹" %}'"></div>
            <button type="button" class="btn-folder primary"
                    @click="bindCurrentPath()" :disabled="loading || !getCurrentPath()">
                {% trans "选择此文件夹" %}
            </button>
        </div>
    </div>
</div>
