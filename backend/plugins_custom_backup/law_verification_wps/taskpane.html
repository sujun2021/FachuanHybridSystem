<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法规引用核查</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>📋 法规引用核查</h1>
      <p class="subtitle">扫描文档中的法律法规引用，核查条文有效性</p>
    </div>
    <div id="config-section" class="section">
      <label for="backend-url">后端地址</label>
      <input type="text" id="backend-url" value="http://127.0.0.1:8002" placeholder="法穿后端地址">
      <label for="credential-id">凭证 ID</label>
      <input type="number" id="credential-id" value="6" placeholder="威科先行凭证 ID">
      <button id="btn-scan" class="btn-primary" onclick="startScan()">🔍 开始核查</button>
    </div>
    <div id="loading" class="section hidden">
      <div class="spinner"></div>
      <p>正在扫描文档并核查法规引用...</p>
    </div>
    <div id="results-section" class="section hidden">
      <div class="summary" id="summary"></div>
      <div id="results-list"></div>
    </div>
    <div id="error-section" class="section hidden">
      <p class="error" id="error-message"></p>
    </div>
  </div>
  <script src="taskpane.js"></script>
</body>
</html>
