name: codeql

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/codeql.yml"
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - "backend/**"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "0 4 * * 0"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fca7ace96b7d713c7035871441585e9c60e4bfde  # v3.28.18
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@fca7ace96b7d713c7035871441585e9c60e4bfde  # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"
