name: java-services-ci

on:
  pull_request:
    paths:
      - 'java-services/**'
      - '.github/workflows/java-services-ci.yml'
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'java-services/**'
      - '.github/workflows/java-services-ci.yml'

jobs:
  poi-service:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: java-services

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@c5195efdbf8b0289858e2fc14f2046d1c5aed254  # v4.7.1
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: ./mvnw compile -q

      - name: Package (skip tests)
        run: ./mvnw package -DskipTests -q

      - name: Verify JAR exists
        run: |
          ls -la poi-service/target/poi-service-*.jar
          echo "✅ JAR built successfully"
