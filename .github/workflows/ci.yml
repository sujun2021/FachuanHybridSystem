name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Ruff lint
        run: ruff check backend/
      - name: Ruff format check
        run: ruff format --check backend/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install mypy django-stubs
      - name: Mypy
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true  # 先作为 warning，后续收紧

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend/apiSystem
          pip install -r ../requirements.txt 2>/dev/null || pip install django
      - name: Check migrations
        run: |
          cd backend/apiSystem
          python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: apiSystem.settings

  media-check:
    name: Media File Management Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Check for forbidden direct file writes
        run: |
          echo "=== Checking for direct open('wb') writes to media ==="
          violations=$(grep -rn "open(.*['\"]wb" --include="*.py" backend/apps/ | grep -v __pycache__ | grep -v .venv | grep -v migrate | grep -v test_ | grep -v "# noqa: media-write" || true)
          if [ -n "$violations" ]; then
            echo "WARNING: Found direct file writes (should use default_storage.save()):"
            echo "$violations"
            echo ""
            echo "See CLAUDE.md 'Media 文件管理规范' for rules."
            # 先作为 warning，不阻塞 CI
          fi
      - name: Check for relative media paths
        run: |
          echo "=== Checking for relative media paths ==="
          violations=$(grep -rn 'Path("media' --include="*.py" backend/apps/ | grep -v __pycache__ || true)
          if [ -n "$violations" ]; then
            echo "ERROR: Found relative media paths (must use settings.MEDIA_ROOT):"
            echo "$violations"
            exit 1
          fi
